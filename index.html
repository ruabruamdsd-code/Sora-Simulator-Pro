<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator Thai - ระบบจำลองโซล่าเซลล์</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for Modules -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        /* Prevent text selection while dragging */
        .select-none { user-select: none; -webkit-user-select: none; }
        /* Prevent pull-to-refresh and other touch actions on canvas */
        .touch-none { touch-action: none; }
        
        /* Grid Background pattern like Proteus */
        .grid-bg {
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
    
    <!-- Google Fonts for Thai support -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Sun, Trash2, Zap, Plus, Settings, Power, Lightbulb, Play, RotateCcw, AlertTriangle, CheckCircle, GripHorizontal, Activity, Battery, Fan, Cylinder, BookOpen, X, BatteryCharging, BoxSelect } from 'lucide-react';

        // --- ค่าคงที่และประเภทอุปกรณ์ (Constants & Types) ---
        const COMPONENT_TYPES = {
            PANEL: 'panel',
            BATTERY: 'battery',
            CHARGER: 'charger',
            CAPACITOR: 'capacitor',
            INVERTER: 'inverter',
            BREAKER: 'breaker',
            SOCKET: 'socket',
            BULB: 'bulb',
            MOTOR: 'motor',
            WIREWAY: 'wireway'
        };

        const SPECS = {
            [COMPONENT_TYPES.PANEL]: { label: 'แผงโซล่าเซลล์ (PV)', type: 'source', maxV: 40, maxA: 5, width: 100, height: 140, terminals: [{id: 'pos', x: 30, color: 'red'}, {id: 'neg', x: 70, color: 'black'}] },
            [COMPONENT_TYPES.BATTERY]: { label: 'แบตเตอรี่ 12V', type: 'source', maxV: 12.8, maxA: 50, width: 100, height: 120, terminals: [{id: 'pos', x: 30, color: 'red'}, {id: 'neg', x: 70, color: 'black'}] },
            [COMPONENT_TYPES.CHARGER]: { 
                label: 'โซล่าร์ชาร์จเจอร์', 
                type: 'converter', 
                width: 140, 
                height: 100, 
                terminals: [
                    {id: 'pv_pos', label: 'PV+', x: 20, color: 'red'}, {id: 'pv_neg', label: 'PV-', x: 40, color: 'black'},
                    {id: 'bat_pos', label: 'BAT+', x: 60, color: 'red'}, {id: 'bat_neg', label: 'BAT-', x: 80, color: 'black'},
                    {id: 'load_pos', label: 'LOAD+', x: 100, color: 'red'}, {id: 'load_neg', label: 'LOAD-', x: 120, color: 'black'}
                ] 
            },
            [COMPONENT_TYPES.CAPACITOR]: { label: 'ตัวเก็บประจุ (Capacitor)', type: 'passive', width: 60, height: 80, terminals: [{id: 'pos', x: 20, color: 'red'}, {id: 'neg', x: 40, color: 'black'}] },
            [COMPONENT_TYPES.INVERTER]: { label: 'อินเวอร์เตอร์ (Inverter)', type: 'converter', width: 140, height: 100, terminals: [{id: 'dc_pos', label: 'DC+', x: 30, color: 'red'}, {id: 'dc_neg', label: 'DC-', x: 50, color: 'black'}, {id: 'ac_l', label: 'L', x: 90, color: 'brown'}, {id: 'ac_n', label: 'N', x: 110, color: 'blue'}] },
            [COMPONENT_TYPES.BREAKER]: { label: 'เบรกเกอร์ (Breaker)', type: 'switch', width: 120, height: 100, terminals: [{id: 'in_1', label: 'เข้า', x: 30, color: 'black'}, {id: 'in_2', label: 'เข้า', x: 50, color: 'black'}, {id: 'out_1', label: 'ออก', x: 70, color: 'black'}, {id: 'out_2', label: 'ออก', x: 90, color: 'black'}] },
            [COMPONENT_TYPES.SOCKET]: { label: 'เต้ารับ (Socket)', type: 'load', defaultWatts: 500, voltageRef: 220, width: 80, height: 80, terminals: [{id: 'l', label: 'L', x: 25, color: 'brown'}, {id: 'n', label: 'N', x: 55, color: 'blue'}] },
            [COMPONENT_TYPES.BULB]: { label: 'หลอดไฟ (Bulb)', type: 'load', defaultWatts: 60, voltageRef: 220, width: 80, height: 100, terminals: [{id: 'l', label: 'L', x: 25, color: 'brown'}, {id: 'n', label: 'N', x: 55, color: 'blue'}] },
            [COMPONENT_TYPES.MOTOR]: { label: 'มอเตอร์ (Motor)', type: 'load', defaultWatts: 150, voltageRef: 12, width: 100, height: 100, terminals: [{id: 'l', label: '+', x: 30, color: 'red'}, {id: 'n', label: '-', x: 70, color: 'black'}] },
            [COMPONENT_TYPES.WIREWAY]: { label: 'รางสายไฟ (Wireway)', type: 'deco', width: 300, height: 60, terminals: [] },
        };

        // --- Utility Functions ---
        
        // Helper: Get robust coordinates from Mouse or Touch events
        const getEventPos = (e) => {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        };

        // Helper: Bind both mouse and touch start events
        const bindStartEvents = (handler) => ({
            onMouseDown: (e) => handler(e),
            onTouchStart: (e) => handler(e),
        });

        // Helper: Generate Orthogonal Wire Path (Proteus Style)
        const getWirePath = (x1, y1, x2, y2, customOffset = null) => {
            const defaultMidY = Math.max(y1, y2) + 40;
            const midY = customOffset ? (defaultMidY + customOffset) : defaultMidY;
            return `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`;
        };

        // --- ส่วนประกอบแสดงผล (Visual Components) ---

        // Modified Terminal: Accepts isHovered to scale up
        const Terminal = ({ x, y, color, label, onInteract, isHovered }) => (
        <g 
            transform={`translate(${x}, ${y})`} 
            {...bindStartEvents((e) => { 
                e.stopPropagation(); 
                onInteract(e); 
            })}
            className="cursor-crosshair group touch-none"
        >
            {/* Invisible Hit Area - Larger for easier touch */}
            <circle r="25" fill="transparent" /> 
            
            {/* Visible Terminal - Scales when hovered */}
            <g className={`transition-all duration-200 origin-center ${isHovered ? 'scale-150' : ''}`}>
                <rect x="-6" y="-6" width="12" height="12" fill="#374151" rx="2" 
                      stroke={isHovered ? "#fbbf24" : "none"} strokeWidth={isHovered ? 2 : 0} />
                <circle r="4" fill={color} stroke="white" strokeWidth="1.5" />
            </g>
            
            {/* Label */}
            {label && (
                <text x="0" y={isHovered ? "24" : "18"} textAnchor="middle" fill={isHovered ? "#000" : "#4b5563"} fontSize="8" fontWeight="bold" className="pointer-events-none transition-all">
                    {label}
                </text>
            )}
        </g>
        );

        const PVPanelVisual = ({ width, height, sunIntensity }) => (
        <g>
            <rect x="0" y="0" width={width} height={height} fill={`rgb(30, 58, ${180 + (sunIntensity/2)})`} stroke="#cbd5e1" strokeWidth="2" />
            <g stroke="rgba(255,255,255,0.4)" strokeWidth="1">
            <line x1="0" y1={height/4} x2={width} y2={height/4} />
            <line x1="0" y1={height/2} x2={width} y2={height/2} />
            <line x1="0" y1={height*0.75} x2={width} y2={height*0.75} />
            <line x1={width/2} y1="0" x2={width/2} y2={height} />
            </g>
            <text x={width/2} y={height/2} textAnchor="middle" fill="white" opacity="0.8" fontSize="12" fontWeight="bold">PV SOLAR</text>
            {sunIntensity < 20 && <text x={width/2} y={height/2 + 20} textAnchor="middle" fill="white" opacity="0.6" fontSize="10">(ไม่มีแสง)</text>}
        </g>
        );

        const BatteryVisual = ({ width, height, soc, isCharging }) => (
        <g>
            <rect x="5" y="10" width={width-10} height={height-10} rx="4" fill="#1f2937" stroke="#374151" strokeWidth="2" />
            <rect x="20" y="0" width="15" height="10" fill="#dc2626" />
            <rect x={width-35} y="0" width="15" height="10" fill="#111827" />
            <rect x="15" y="30" width={width-30} height={50} rx="2" fill="#374151" stroke="#4b5563" />
            <rect x="18" y="33" width={(width-36) * (soc / 100)} height={44} rx="1" fill={soc > 20 ? "#22c55e" : "#ef4444"} className="transition-all duration-300" />
            <text x={width/2} y="60" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold" style={{textShadow: '0 1px 2px black'}}>
                {Math.round(soc)}%
            </text>
            {isCharging && (
                <g transform={`translate(${width/2 - 8}, 85)`}>
                    <circle r="8" fill="#eab308" />
                    <path d="M-2 -4 L2 0 L-1 0 L1 4 L-3 0 L0 0 Z" fill="black" transform="scale(1.5)" />
                </g>
            )}
            <text x={width/2} y="100" textAnchor="middle" fill="#9ca3af" fontSize="9">12V 100Ah</text>
        </g>
        );

        const ChargerVisual = ({ width, height, isCharging, hasLoad }) => (
        <g>
            <rect x="0" y="0" width={width} height={height} rx="6" fill="#0ea5e9" stroke="#0284c7" strokeWidth="2" />
            <rect x="20" y="15" width={width-40} height="30" rx="2" fill="#ecfccb" stroke="#84cc16" strokeWidth="1" />
            <text x={width/2} y="35" textAnchor="middle" fill="#3f6212" fontSize="10" fontWeight="bold" fontFamily="monospace">
                {isCharging ? "CHARGING..." : "STANDBY"}
            </text>
            <g transform="translate(20, 55)">
                <circle cx="0" cy="0" r="4" fill={isCharging ? "#22c55e" : "#1e293b"} />
                <text x="8" y="3" fontSize="8" fill="white">Charge</text>
            </g>
            <g transform="translate(80, 55)">
                <circle cx="0" cy="0" r="4" fill={hasLoad ? "#ef4444" : "#1e293b"} />
                <text x="8" y="3" fontSize="8" fill="white">Load</text>
            </g>
            <text x="30" y={height-5} textAnchor="middle" fontSize="8" fill="white">PV</text>
            <text x="70" y={height-5} textAnchor="middle" fontSize="8" fill="white">BAT</text>
            <text x="110" y={height-5} textAnchor="middle" fontSize="8" fill="white">LOAD</text>
            <text x={width/2} y="8" textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize="8" fontWeight="bold">SOLAR CHARGE</text>
        </g>
        );

        const CapacitorVisual = ({ width, height }) => (
        <g>
            <circle cx={width/2} cy={height/2 + 10} r="25" fill="#2563eb" stroke="#1e40af" strokeWidth="2" />
            <rect x={width/2 - 25} y={height/2 + 10} width="50" height="10" fill="#1d4ed8" />
            <line x1={width/2 - 10} y1={height/2 - 15} x2={width/2 - 10} y2={0} stroke="#ef4444" strokeWidth="4" />
            <line x1={width/2 + 10} y1={height/2 - 15} x2={width/2 + 10} y2={0} stroke="#1f2937" strokeWidth="4" />
            <ellipse cx={width/2} cy={height/2 - 15} rx="25" ry="8" fill="#60a5fa" stroke="#1e40af" strokeWidth="1" />
            <text x={width/2} y={height-10} textAnchor="middle" fill="#1e3a8a" fontSize="10" fontWeight="bold">Capacitor</text>
        </g>
        );

        const BoxVisual = ({ width, height, label, subLabel, isPowered, error }) => (
        <g>
            <rect x="0" y="0" width={width} height={height} rx="4" fill="white" stroke="#374151" strokeWidth="2" className="shadow-sm" />
            <rect x="0" y="0" width={width} height="25" rx="4" fill="#f3f4f6" stroke="none" />
            <line x1="0" y1="25" x2={width} y2="25" stroke="#e5e7eb" strokeWidth="1" />
            <text x={width/2} y="18" textAnchor="middle" fill="#111827" fontSize="10" fontWeight="bold">{label}</text>
            <circle cx={width - 15} cy="12.5" r="4" fill={error ? "#ef4444" : (isPowered ? "#22c55e" : "#d1d5db")} stroke="#9ca3af" strokeWidth="1" />
            {error && (
                <g>
                    <rect x="10" y={height/2 - 12} width={width-20} height={24} rx="4" fill="rgba(220, 38, 38, 0.9)" />
                    <text x={width/2} y={height/2 + 4} textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">{error}</text>
                </g>
            )}
            {subLabel && !error && <text x={width/2} y={height/2 + 5} textAnchor="middle" fill="#6b7280" fontSize="10">{subLabel}</text>}
        </g>
        );

        const SocketVisual = ({ width, height, isPowered, watts }) => (
        <g>
            <rect x="0" y="0" width={width} height={height} rx="4" fill="#f9fafb" stroke="#9ca3af" strokeWidth="2" />
            <circle cx={width*0.3} cy={height/2} r="6" fill="#1f2937" />
            <circle cx={width*0.7} cy={height/2} r="6" fill="#1f2937" />
            {isPowered && <rect x={width/2 - 2} y={height - 10} width="4" height="4" fill="#22c55e" className="animate-pulse" />}
            <text x={width/2} y={height/2 + 25} textAnchor="middle" fill="#6b7280" fontSize="8">{watts}W</text>
        </g>
        );

        const BulbVisual = ({ width, height, isPowered, watts }) => (
        <g>
            <rect x="0" y="0" width={width} height={height} rx="4" fill="transparent" /> 
            <rect x={width/2 - 10} y={height-20} width="20" height="15" fill="#9ca3af" />
            <circle cx={width/2} cy={height/2 - 10} r="25" fill={isPowered ? "#fef08a" : "white"} stroke="#d1d5db" strokeWidth="1" />
            {isPowered && (
            <circle cx={width/2} cy={height/2 - 10} r="30" fill="none" stroke="#fbbf24" strokeWidth="4" className="animate-pulse" opacity="0.5" />
            )}
            <text x={width/2} y={height/2 - 10} textAnchor="middle" fill={isPowered ? "#b45309" : "#9ca3af"} fontSize="10" fontWeight="bold">{watts}W</text>
        </g>
        );

        const MotorVisual = ({ width, height, isPowered, watts }) => (
        <g>
            <rect x="10" y="20" width={width-20} height={height-40} rx="5" fill="#4b5563" />
            <circle cx={width/2} cy={height/2} r="25" fill="#374151" stroke="#d1d5db" strokeWidth="2" />
            <g transform={`translate(${width/2}, ${height/2})`}>
                <path 
                    d="M -20 0 L 20 0 M 0 -20 L 0 20" 
                    stroke="white" 
                    strokeWidth="4" 
                    className={isPowered ? "animate-spin origin-center" : ""} 
                    style={{ animationDuration: '0.5s' }}
                />
                <circle r="5" fill="#9ca3af" />
            </g>
            <rect x={width/2 - 15} y={height-20} width="30" height="20" fill="#1f2937" />
            <text x={width/2} y={15} textAnchor="middle" fill="#4b5563" fontSize="10">{watts}W</text>
        </g>
        );

        // --- Tool Components ---
        const DraggableProbe = ({ type, x, y, onInteract }) => (
            <div 
                {...bindStartEvents(onInteract)}
                className="absolute cursor-move z-50 hover:scale-110 transition-transform touch-none"
                style={{ left: x, top: y, transform: 'translate(-50%, -100%)' }}
            >
                <div className={`w-3 h-20 ${type === 'red' ? 'bg-red-500' : 'bg-gray-800'} rounded-t-sm rounded-b-full shadow-lg border border-white/20 relative`}>
                    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-full w-1 h-6 bg-gray-300 rounded-full shadow-sm"></div>
                </div>
            </div>
        );

        const ClampMeterTool = ({ x, y, value, onInteract, isActive }) => (
            <div 
                {...bindStartEvents(onInteract)}
                className="absolute z-50 cursor-move group touch-none"
                style={{ left: x, top: y, transform: 'translate(-50%, -50%)' }}
            >
                <div className="relative w-24 h-40 transition-transform duration-100 ease-out">
                    <div className={`absolute top-0 left-0 w-24 h-24 border-[12px] rounded-full border-b-transparent rotate-45 shadow-xl transition-colors duration-200 ${isActive ? 'border-green-500 scale-105' : 'border-orange-500'}`}>
                        {isActive && <div className="absolute inset-0 rounded-full border-4 border-white/30 animate-pulse"></div>}
                    </div>
                    <div className={`absolute bottom-0 left-1/2 -translate-x-1/2 w-16 h-24 rounded-lg shadow-lg flex flex-col items-center justify-center border-2 transition-colors duration-200 ${isActive ? 'bg-orange-600 border-orange-700' : 'bg-orange-500 border-orange-600'}`}>
                        <div className={`bg-gray-200 w-12 h-8 rounded border border-gray-400 font-mono text-center flex items-center justify-center text-gray-800 font-bold ${isActive ? 'bg-green-100 text-green-800 border-green-500' : ''}`}>
                            {value !== null && isActive ? value.toFixed(2) : '---'}
                        </div>
                        <div className="text-[8px] font-bold text-white mt-1">แอมป์มิเตอร์</div>
                        <div className="mt-2 w-8 h-8 rounded-full border-4 border-orange-800 bg-orange-300"></div>
                    </div>
                </div>
            </div>
        );

        const VoltmeterDisplay = ({ value }) => (
            <div className="absolute bottom-4 right-4 bg-yellow-400 p-3 rounded-xl border-4 border-gray-800 shadow-2xl w-48 z-40 relative group">
                <div className="absolute -top-10 -left-2 animate-bounce opacity-90" style={{ animationDuration: '3s' }}>
                    <span className="text-slate-600 font-bold text-2xl select-none" style={{textShadow: '1px 1px 0 #fff'}}>Z</span>
                    <span className="text-slate-500 font-bold text-xl ml-0.5 select-none" style={{textShadow: '1px 1px 0 #fff'}}>z</span>
                    <span className="text-slate-400 font-bold text-lg ml-0.5 select-none" style={{textShadow: '1px 1px 0 #fff'}}>z</span>
                </div>
                <div className="bg-[#9ca3af] h-12 mb-3 rounded border-2 border-gray-600 shadow-inner flex items-center justify-end px-3 font-mono text-2xl text-gray-900 font-bold relative overflow-hidden">
                    <div className="absolute inset-0 bg-gradient-to-b from-transparent to-black/10 pointer-events-none"></div>
                    {value !== null ? value.toFixed(1) : '---'} <span className="text-sm ml-1">V</span>
                </div>
                <div className="flex justify-center gap-4 mb-2">
                    <div className="w-10 h-10 bg-white rounded-full border-2 border-gray-800 relative overflow-hidden shadow-sm">
                        <div className="absolute top-0 w-full h-[65%] bg-yellow-400 border-b-4 border-gray-800 z-10"></div>
                        <div className="absolute bottom-1 right-2 w-3 h-3 bg-black rounded-full opacity-80"></div>
                    </div>
                    <div className="w-10 h-10 bg-white rounded-full border-2 border-gray-800 relative overflow-hidden shadow-sm">
                        <div className="absolute top-0 w-full h-[65%] bg-yellow-400 border-b-4 border-gray-800 z-10"></div>
                        <div className="absolute bottom-1 right-2 w-3 h-3 bg-black rounded-full opacity-80"></div>
                    </div>
                </div>
                <div className="absolute bottom-[2.8rem] left-1/2 -translate-x-1/2 w-4 h-1 bg-gray-800 rounded-full opacity-30"></div>
                <div className="flex justify-between items-center px-1 border-t border-yellow-500 pt-2 mt-1">
                    <div className="text-[10px] font-bold text-yellow-900">โวลต์มิเตอร์ (ง่วง)</div>
                    <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                </div>
            </div>
        );

        // --- Guide Component ---
        const WiringGuideModal = ({ onClose }) => {
            return (
                <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[80vh] overflow-y-auto animate-in zoom-in duration-200">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl sticky top-0 z-10">
                            <h2 className="text-xl font-bold flex items-center gap-2 text-gray-800">
                                <BookOpen className="text-blue-600"/> คู่มือการต่อวงจรเบื้องต้น
                            </h2>
                            <button onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition-colors"><X size={24}/></button>
                        </div>
                        <div className="p-6 space-y-8">
                            <section>
                                <h3 className="font-bold text-lg text-blue-800 mb-3 flex items-center gap-2">
                                    <span className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">1</span> 
                                    ระบบพื้นฐาน (DC to AC)
                                </h3>
                                <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 text-sm space-y-2">
                                    <p className="font-semibold text-gray-700">ลำดับการเชื่อมต่อ:</p>
                                    <ul className="list-disc list-inside space-y-1 text-gray-600 ml-2">
                                        <li><strong>แผงโซล่า (+)</strong> <span className="text-gray-400">--&gt;</span> <strong>เบรกเกอร์ (เข้า)</strong> <span className="text-gray-400">--&gt;</span> <strong>อินเวอร์เตอร์ (DC+)</strong></li>
                                        <li><strong>แผงโซล่า (-)</strong> <span className="text-gray-400">--&gt;</span> <strong>เบรกเกอร์ (เข้า)</strong> <span className="text-gray-400">--&gt;</span> <strong>อินเวอร์เตอร์ (DC-)</strong></li>
                                        <li><strong>อินเวอร์เตอร์ (L/N)</strong> <span className="text-gray-400">--&gt;</span> <strong>หลอดไฟ (L/N)</strong></li>
                                    </ul>
                                </div>
                            </section>
                        </div>
                        <div className="p-4 border-t bg-gray-50 rounded-b-xl text-right">
                            <button onClick={onClose} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold transition-colors">เข้าใจแล้ว</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        function SolarSimulatorPro() {
        const [components, setComponents] = useState([]);
        const [wires, setWires] = useState([]); 
        const [sunIntensity, setSunIntensity] = useState(80);
        const [dragInfo, setDragInfo] = useState(null); 
        const [tempWire, setTempWire] = useState(null);
        
        // Hover State for Terminals (Snap Effect)
        const [hoveredTerm, setHoveredTerm] = useState(null); // { compId, termId }
        
        const [batteryState, setBatteryState] = useState({}); 
        const [selectedObj, setSelectedObj] = useState(null); 
        const [showGuide, setShowGuide] = useState(false);
        const [activeTool, setActiveTool] = useState(null); 
        const [probePos, setProbePos] = useState({ red: { x: 300, y: 300, term: null }, black: { x: 350, y: 300, term: null } });
        const [clampPos, setClampPos] = useState({ x: 400, y: 400, wireId: null });
        const [isRunning, setIsRunning] = useState(false);
        const [simResults, setSimResults] = useState({ voltages: new Map(), wireCurrents: new Map(), states: {} });
        const [notification, setNotification] = useState(null);

        const canvasRef = useRef(null);

        const getLocalPos = (e) => {
            const { x, y } = getEventPos(e);
            if (canvasRef.current) {
                const rect = canvasRef.current.getBoundingClientRect();
                return { x: x - rect.left, y: y - rect.top };
            }
            return { x, y };
        };

        // Keyboard Listener
        useEffect(() => {
            const handleKeyDown = (e) => {
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (selectedObj) deleteSelected();
                }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [selectedObj, isRunning]);

        // Logic Engine ... (Same as before)
        useEffect(() => {
            const nets = [];
            const getNet = (id) => nets.find(s => s.has(id));
            components.forEach(c => {
            const spec = SPECS[c.type];
            if(spec.terminals) {
                spec.terminals.forEach(t => {
                    const s = new Set();
                    s.add(`${c.id}_${t.id}`);
                    nets.push(s);
                });
            }
            });
            wires.forEach(w => {
                const net1 = getNet(`${w.from}_${w.fromTerm}`);
                const net2 = getNet(`${w.to}_${w.toTerm}`);
                if(net1 && net2 && net1 !== net2) {
                    net2.forEach(i => net1.add(i));
                    nets.splice(nets.indexOf(net2), 1);
                }
            });

            const netVoltages = new Map();
            const compStates = {};
            const wireCurrents = new Map();

            components.filter(c => c.type === COMPONENT_TYPES.PANEL).forEach(pv => {
                const v = 40 * (sunIntensity/100);
                const posNet = getNet(`${pv.id}_pos`);
                const negNet = getNet(`${pv.id}_neg`);
                if(!netVoltages.has(negNet)) netVoltages.set(negNet, 0);
                const currentPosV = netVoltages.get(posNet) || 0;
                const newPosV = (netVoltages.get(negNet) || 0) + v;
                netVoltages.set(posNet, Math.max(currentPosV, newPosV));
                compStates[pv.id] = { outputV: v, isPowered: v > 5 };
            });

            components.filter(c => c.type === COMPONENT_TYPES.BATTERY).forEach(bat => {
                const soc = batteryState[bat.id]?.soc ?? 50;
                const isDead = soc <= 0;
                const v = isDead ? 0 : 12.8; 
                const posNet = getNet(`${bat.id}_pos`);
                const negNet = getNet(`${bat.id}_neg`);
                if(!netVoltages.has(negNet)) netVoltages.set(negNet, 0);
                const currentPosV = netVoltages.get(posNet) || 0;
                const newPosV = (netVoltages.get(negNet) || 0) + v;
                netVoltages.set(posNet, Math.max(currentPosV, newPosV));
                compStates[bat.id] = { outputV: v, isPowered: !isDead };
            });

            for(let i=0; i<8; i++) {
                components.forEach(c => {
                    if(c.type === COMPONENT_TYPES.CHARGER) {
                        const pvPos = getNet(`${c.id}_pv_pos`);
                        const pvNeg = getNet(`${c.id}_pv_neg`);
                        const batPos = getNet(`${c.id}_bat_pos`);
                        const batNeg = getNet(`${c.id}_bat_neg`);
                        const loadPos = getNet(`${c.id}_load_pos`);
                        const loadNeg = getNet(`${c.id}_load_neg`);
                        const vPV = (netVoltages.get(pvPos) || 0) - (netVoltages.get(pvNeg) || 0);
                        let isCharging = false;
                        let hasLoad = false;
                        if (vPV > 12) {
                            if (!netVoltages.has(batNeg)) netVoltages.set(batNeg, 0);
                            const refV = netVoltages.get(batNeg) || 0;
                            netVoltages.set(batPos, Math.max(netVoltages.get(batPos)||0, refV + 14.4));
                            isCharging = true;
                        }
                        const currentBatV = (netVoltages.get(batPos) || 0) - (netVoltages.get(batNeg) || 0);
                        if (currentBatV > 11.5) {
                            if (!netVoltages.has(loadNeg)) netVoltages.set(loadNeg, 0);
                            const refLoadV = netVoltages.get(loadNeg) || 0;
                            netVoltages.set(loadPos, Math.max(netVoltages.get(loadPos)||0, refLoadV + currentBatV));
                            hasLoad = true;
                        }
                        compStates[c.id] = { isPowered: true, isCharging, hasLoad };
                    }
                    if(c.type === COMPONENT_TYPES.INVERTER) {
                        const dcPos = getNet(`${c.id}_dc_pos`);
                        const dcNeg = getNet(`${c.id}_dc_neg`);
                        const acL = getNet(`${c.id}_ac_l`);
                        const acN = getNet(`${c.id}_ac_n`);
                        const vIn = (netVoltages.get(dcPos) || 0) - (netVoltages.get(dcNeg) || 0);
                        if(vIn > 45) {
                            compStates[c.id] = { isPowered: false, error: 'Over V' };
                            netVoltages.set(acL, 0);
                        } else if (vIn < 11) {
                            compStates[c.id] = { isPowered: false, error: 'Low V' };
                            netVoltages.set(acL, 0);
                        } else {
                            compStates[c.id] = { isPowered: true };
                            if(!netVoltages.has(acN)) netVoltages.set(acN, 0);
                            netVoltages.set(acL, 220); 
                        }
                    }
                    if(c.type === COMPONENT_TYPES.BREAKER) {
                        const in1 = getNet(`${c.id}_in_1`); const out1 = getNet(`${c.id}_out_1`);
                        const in2 = getNet(`${c.id}_in_2`); const out2 = getNet(`${c.id}_out_2`);
                        if(netVoltages.has(in1)) netVoltages.set(out1, netVoltages.get(in1));
                        else if(netVoltages.has(out1)) netVoltages.set(in1, netVoltages.get(out1));
                        if(netVoltages.has(in2)) netVoltages.set(out2, netVoltages.get(in2));
                        else if(netVoltages.has(out2)) netVoltages.set(in2, netVoltages.get(out2));
                        compStates[c.id] = { isPowered: true };
                    }
                    if(['socket', 'bulb', 'motor'].includes(c.type)) {
                        const l = getNet(`${c.id}_l`);
                        const n = getNet(`${c.id}_n`);
                        const vDiff = (netVoltages.get(l) || 0) - (netVoltages.get(n) || 0);
                        let hasPower = false;
                        if (c.type === 'motor') hasPower = Math.abs(vDiff) > 10; 
                        else hasPower = Math.abs(vDiff) > 200;
                        compStates[c.id] = { isPowered: hasPower, physicsPowered: hasPower };
                    }
                });
            }

            if (isRunning) {
                components.filter(c => ['socket', 'bulb', 'motor'].includes(c.type) && compStates[c.id]?.physicsPowered).forEach(load => {
                    const watts = load.watts || SPECS[load.type].defaultWatts;
                    const voltage = SPECS[load.type].voltageRef || 220;
                    const current = watts / voltage;
                    const lNet = getNet(`${load.id}_l`);
                    wires.forEach(w => {
                        const wNet = getNet(`${w.from}_${w.fromTerm}`);
                        if (wNet === lNet) wireCurrents.set(w.id, (wireCurrents.get(w.id) || 0) + current);
                    });
                    const nNet = getNet(`${load.id}_n`);
                    wires.forEach(w => {
                        const wNet = getNet(`${w.from}_${w.fromTerm}`);
                        if (wNet === nNet) wireCurrents.set(w.id, (wireCurrents.get(w.id) || 0) + current);
                    });
                });
            }
            setSimResults({ voltages: netVoltages, wireCurrents, states: compStates, nets });
        }, [components, wires, sunIntensity, isRunning, batteryState]);

        // Battery Loop ... (Same)
        useEffect(() => {
            if (!isRunning) return;
            const interval = setInterval(() => {
                setBatteryState(prev => {
                    const next = { ...prev };
                    let totalLoadWatts = 0;
                    components.forEach(c => {
                         const state = simResults.states[c.id];
                         if (['socket', 'bulb', 'motor'].includes(c.type) && state?.physicsPowered) {
                             totalLoadWatts += (c.watts || SPECS[c.type].defaultWatts);
                         }
                    });
                    components.filter(c => c.type === COMPONENT_TYPES.BATTERY).forEach(bat => {
                        const currentSoc = prev[bat.id]?.soc ?? 50;
                        let flow = 0;
                        let isCharging = false;
                        const posNet = simResults.nets?.find(n => n.has(`${bat.id}_pos`));
                        const netV = simResults.voltages?.get(posNet) || 0;
                        if (netV > 13.2) {
                            isCharging = true;
                            flow += 0.2 + (sunIntensity / 50); 
                        } 
                        if (!isCharging && currentSoc > 0 && totalLoadWatts > 0) {
                            const dischargeAmps = totalLoadWatts / 12;
                            flow -= dischargeAmps * 0.05; 
                        }
                        else if (!isCharging && currentSoc > 0 && totalLoadWatts === 0) {
                             flow -= 0.01;
                        }
                        let newSoc = currentSoc + flow;
                        if (newSoc > 100) newSoc = 100;
                        if (newSoc < 0) newSoc = 0;
                        next[bat.id] = { soc: newSoc, isCharging };
                    });
                    return next;
                });
            }, 500);
            return () => clearInterval(interval);
        }, [isRunning, components, wires, simResults, sunIntensity]);

        // --- Interaction Handlers ---

        const handleGlobalMove = (e) => {
            if(e.touches) e.preventDefault(); 
            const { x: localX, y: localY } = getLocalPos(e);
            
            // --- 1. Proximity Check for Terminals (Snap Effect) ---
            let closestTerm = null;
            let minDist = 30; // Radius for snapping

            components.forEach(c => {
                const spec = SPECS[c.type];
                if (spec.terminals) {
                    spec.terminals.forEach(t => {
                        const tx = c.x + t.x;
                        const ty = c.y + spec.height + 5;
                        const dist = Math.hypot(localX - tx, localY - ty);
                        if (dist < minDist) {
                            minDist = dist;
                            closestTerm = { compId: c.id, termId: t.id };
                        }
                    });
                }
            });
            setHoveredTerm(closestTerm);
            // -----------------------------------------------------

            if(dragInfo?.type === 'comp') {
                setComponents(prev => prev.map(c => c.id === dragInfo.id ? {...c, x: localX - dragInfo.offsetX, y: localY - dragInfo.offsetY} : c));
            }
            if(dragInfo?.type === 'wireHandle') {
                setWires(prev => prev.map(w => w.id === dragInfo.id ? { ...w, customOffset: (localY - dragInfo.baseY) } : w));
            }
            if(dragInfo?.type === 'probe') {
                setProbePos(prev => ({ ...prev, [dragInfo.color]: { x: localX, y: localY, term: null } }));
            }
            if(dragInfo?.type === 'clamp') {
                const hit = findHitWire(localX, localY, 60);
                if (hit) setClampPos({ x: localX, y: hit.y + 32, wireId: hit.id });
                else setClampPos({ x: localX, y: localY, wireId: null });
            }
            if(tempWire) {
                // If hovering over a terminal, snap the temp wire to it!
                if (closestTerm) {
                    const c = components.find(c => c.id === closestTerm.compId);
                    const spec = SPECS[c.type];
                    const t = spec.terminals.find(t => t.id === closestTerm.termId);
                    setTempWire(prev => ({...prev, x2: c.x + t.x, y2: c.y + spec.height + 5}));
                } else {
                    setTempWire(prev => ({...prev, x2: localX, y2: localY}));
                }
            }
        };

        const handleGlobalMouseUp = (e) => {
            const { x: localX, y: localY } = getLocalPos(e);

            if (dragInfo?.type === 'probe') {
                // Use the same hit logic (which is now consistent via shared visual or logic)
                const hit = findHitTerminal(localX, localY);
                if(hit) setProbePos(prev => ({ ...prev, [dragInfo.color]: { x: hit.x, y: hit.y, term: hit } }));
            }

            if(tempWire) {
                // Check if we dropped ON a terminal (using the robust hit check)
                const hit = findHitTerminal(localX, localY);
                if(hit && (hit.compId !== tempWire.from || hit.termId !== tempWire.fromTerm)) {
                    setWires(prev => [...prev, {
                        id: Date.now(),
                        from: tempWire.from, fromTerm: tempWire.fromTerm,
                        to: hit.compId, toTerm: hit.termId,
                        customOffset: 0
                    }]);
                }
                setTempWire(null);
            }
            setDragInfo(null);
        };

        const handleWireClick = (e, wireId) => {
            e.stopPropagation();
            setSelectedObj({ type: 'wire', id: wireId });
        };

        const handleCompClick = (e, comp) => {
            setSelectedObj({ type: 'comp', id: comp.id });
        };

        const deleteSelected = () => {
            if (selectedObj) {
                if (selectedObj.type === 'wire') {
                    setWires(prev => prev.filter(w => w.id !== selectedObj.id));
                } else {
                    setComponents(prev => prev.filter(c => c.id !== selectedObj.id));
                    setWires(prev => prev.filter(w => w.from !== selectedObj.id && w.to !== selectedObj.id));
                    if (selectedObj.type === 'comp') {
                        setBatteryState(prev => {
                            const next = {...prev};
                            delete next[selectedObj.id];
                            return next;
                        });
                    }
                }
                setSelectedObj(null);
                if (isRunning) { setIsRunning(false); setNotification(null); }
            }
        };

        const findHitTerminal = (mx, my) => {
            // First check if we have a hovered terminal from the move event (Snap)
            // But we need to verify distance again to be safe or just iterate with larger radius
            let hit = null;
            components.forEach(c => {
                const spec = SPECS[c.type];
                if(!spec.terminals) return;
                spec.terminals.forEach(t => {
                    const tx = c.x + t.x;
                    const ty = c.y + spec.height + 5;
                    // Increased hit radius to 30 to match snap effect
                    if(Math.hypot(mx - tx, my - ty) < 30) {
                        hit = { compId: c.id, termId: t.id, x: tx, y: ty };
                    }
                });
            });
            return hit;
        };

        const findHitWire = (mx, my, tolerance = 20) => {
            let closest = null;
            let closestDist = Infinity;
            for(let w of wires) {
                const c1 = components.find(c => c.id === w.from);
                const c2 = components.find(c => c.id === w.to);
                if(!c1 || !c2) continue;
                const t1 = SPECS[c1.type].terminals.find(t => t.id === w.fromTerm);
                const t2 = SPECS[c2.type].terminals.find(t => t.id === w.toTerm);
                const p1 = { x: c1.x + t1.x, y: c1.y + SPECS[c1.type].height + 5 };
                const p2 = { x: c2.x + t2.x, y: c2.y + SPECS[c2.type].height + 5 };
                const defaultMidY = Math.max(p1.y, p2.y) + 40;
                const midY = w.customOffset ? (defaultMidY + w.customOffset) : defaultMidY;
                const minX = Math.min(p1.x, p2.x);
                const maxX = Math.max(p1.x, p2.x);
                if (mx >= minX - tolerance && mx <= maxX + tolerance) {
                    const dist = Math.abs(my - midY);
                    if (dist < tolerance && dist < closestDist) {
                        closestDist = dist;
                        closest = { id: w.id, y: midY };
                    }
                }
            }
            return closest;
        }

        const getVoltageReading = () => {
            if (!probePos.red.term || !probePos.black.term) return null;
            const getNetVoltage = (term) => {
                const net = simResults.nets.find(n => n.has(`${term.compId}_${term.termId}`));
                return net ? (simResults.voltages.get(net) || 0) : 0;
            };
            const v1 = getNetVoltage(probePos.red.term);
            const v2 = getNetVoltage(probePos.black.term);
            return Math.abs(v1 - v2);
        };

        const getCurrentReading = () => {
            if (!clampPos.wireId) return 0;
            return simResults.wireCurrents.get(clampPos.wireId) || 0;
        };

        const addComponent = (type) => {
            const spec = SPECS[type];
            const newId = Date.now().toString();
            setComponents([...components, { 
                id: newId, 
                type, 
                x: 100 + components.length * 20, 
                y: 100 + components.length * 20,
                watts: spec.defaultWatts 
            }]);
            if (type === COMPONENT_TYPES.BATTERY) {
                setBatteryState(prev => ({...prev, [newId]: { soc: 50, isCharging: false }}));
            }
            if(isRunning) { setIsRunning(false); setNotification(null); }
        };

        const updateComponentWatts = (id, newWatts) => {
            setComponents(prev => prev.map(c => c.id === id ? { ...c, watts: parseInt(newWatts) } : c));
            if(isRunning) { setIsRunning(false); setNotification(null); }
        };

        const runCheck = () => {
            setIsRunning(true);
            setTimeout(() => {
                const powered = components.filter(c => ['socket','bulb','motor'].includes(c.type)).some(c => simResults.states[c.id]?.physicsPowered);
                setNotification({ 
                    type: powered ? 'success' : 'error', 
                    message: powered ? 'ระบบทำงานปกติ (System OK)' : 'ไฟไม่เข้าระบบ (No Power)' 
                });
            }, 200);
        };

        const getSelectedComponent = () => components.find(c => c.id === selectedObj?.id);

        return (
            <div className="flex h-screen bg-slate-100 font-sans select-none overflow-hidden touch-none grid-bg" 
                onMouseMove={handleGlobalMove} 
                onTouchMove={handleGlobalMove}
                onMouseUp={handleGlobalMouseUp} 
                onTouchEnd={handleGlobalMouseUp}
                onClick={() => setSelectedObj(null)}>
            
            {showGuide && <WiringGuideModal onClose={() => setShowGuide(false)} />}

            <div className="w-64 bg-white border-r shadow-xl flex flex-col z-30" onClick={e => e.stopPropagation()}>
                <div className="p-4 bg-gray-900 text-white shadow-md flex justify-between items-center">
                    <h1 className="text-xl font-bold flex items-center gap-2 text-yellow-400"><Zap className="fill-current"/> Solar Sim Thai</h1>
                </div>
                <div className="p-4 flex-1 overflow-y-auto space-y-3">
                    <button 
                        onClick={() => setShowGuide(true)}
                        className="w-full flex items-center justify-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-700 p-2 rounded-lg border border-blue-200 transition-colors font-bold mb-2"
                    >
                        <BookOpen size={18}/> คู่มือการต่อวงจร
                    </button>
                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                        {!isRunning ? (
                            <button onClick={runCheck} className="w-full flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg shadow-lg transition-all font-bold">
                                <Play size={20} fill="currentColor"/> เริ่มจำลองการทำงาน
                            </button>
                        ) : (
                            <button onClick={() => { setIsRunning(false); setNotification(null); }} className="w-full flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white p-3 rounded-lg shadow-lg transition-all font-bold">
                                <RotateCcw size={20} /> หยุด / แก้ไข
                            </button>
                        )}
                    </div>
                    <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <label className="text-xs font-bold text-blue-800 uppercase flex justify-between">
                            <span>ความเข้มแสงอาทิตย์</span>
                            <span>{sunIntensity}%</span>
                        </label>
                        <input 
                            type="range" 
                            min="0" max="100" 
                            value={sunIntensity} 
                            onChange={(e) => setSunIntensity(parseInt(e.target.value))}
                            className="w-full mt-2 h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-orange-500"
                        />
                    </div>
                    <div className="space-y-2">
                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">เครื่องมือวัด (Measuring)</label>
                        <div className="grid grid-cols-2 gap-2">
                            <button 
                                onClick={() => { setActiveTool(activeTool === 'volt' ? null : 'volt'); setProbePos({ red: {x:300, y:300, term:null}, black: {x:350, y:300, term:null} }); }}
                                className={`p-3 rounded-lg border-2 flex flex-col items-center gap-2 transition-all ${activeTool === 'volt' ? 'bg-yellow-50 border-yellow-400 text-yellow-700' : 'bg-white border-gray-100 hover:border-blue-200'}`}
                            >
                                <div className="w-8 h-8 rounded bg-yellow-400 flex items-center justify-center font-bold text-gray-900 border border-yellow-600">V</div>
                                <span className="text-xs font-bold">โวลต์มิเตอร์</span>
                            </button>
                            <button 
                                onClick={() => { setActiveTool(activeTool === 'amp' ? null : 'amp'); }}
                                className={`p-3 rounded-lg border-2 flex flex-col items-center gap-2 transition-all ${activeTool === 'amp' ? 'bg-orange-50 border-orange-400 text-orange-700' : 'bg-white border-gray-100 hover:border-blue-200'}`}
                            >
                                <div className="w-8 h-8 rounded bg-orange-500 flex items-center justify-center font-bold text-white border border-orange-600">A</div>
                                <span className="text-xs font-bold">แคลมป์มิเตอร์</span>
                            </button>
                        </div>
                    </div>
                    <div className="space-y-2 pt-4 border-t">
                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">เพิ่มอุปกรณ์ (Add Components)</label>
                        {Object.keys(SPECS).map(type => (
                            <button key={type} onClick={() => addComponent(type)} className="w-full flex items-center gap-3 p-2 bg-white border border-gray-100 rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-all group shadow-sm">
                                <div className="w-8 h-8 flex items-center justify-center bg-gray-50 rounded text-gray-500 group-hover:text-blue-600">
                                    {type === 'panel' ? <Sun size={18}/> : 
                                    type === 'bulb' ? <Lightbulb size={18}/> : 
                                    type === 'battery' ? <Battery size={18}/> :
                                    type === 'charger' ? <BatteryCharging size={18}/> :
                                    type === 'capacitor' ? <Cylinder size={18}/> :
                                    type === 'motor' ? <Fan size={18}/> : <Power size={18}/>}
                                </div>
                                <div className="text-left flex-1">
                                    <div className="text-xs font-bold text-gray-700">{SPECS[type].label.split('(')[0]}</div>
                                    <div className="text-[9px] text-gray-400">{SPECS[type].label.split('(')[1]?.replace(')', '')}</div>
                                </div>
                                <Plus size={14} className="text-gray-300"/>
                            </button>
                        ))}
                    </div>
                </div>
            </div>

            <div 
                ref={canvasRef}
                className="flex-1 relative overflow-hidden bg-slate-100 grid-bg" 
                style={{backgroundSize: '24px 24px'}}
            >
                
                {selectedObj && selectedObj.type === 'comp' && ['bulb', 'motor', 'socket'].includes(getSelectedComponent()?.type) && (
                    <div className="absolute top-4 right-4 z-50 bg-white p-4 rounded-xl shadow-2xl border border-gray-200 w-64 animate-in slide-in-from-right-10 fade-in duration-300" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                <Settings size={16} /> ตั้งค่าอุปกรณ์
                            </h3>
                            <button onClick={deleteSelected} className="text-red-500 hover:bg-red-50 p-1 rounded"><Trash2 size={16}/></button>
                        </div>
                        <div className="space-y-3">
                            <div>
                                <label className="text-xs font-bold text-gray-500 block mb-1">กำลังไฟฟ้า (Watt)</label>
                                <div className="flex items-center gap-2">
                                    <input 
                                        type="number" 
                                        value={getSelectedComponent().watts || ''} 
                                        onChange={(e) => updateComponentWatts(selectedObj.id, e.target.value)}
                                        className="w-full border rounded p-2 text-sm"
                                    />
                                    <span className="text-sm font-bold text-gray-600">W</span>
                                </div>
                                <input 
                                    type="range" min="10" max="2000" step="10"
                                    value={getSelectedComponent().watts || 0}
                                    onChange={(e) => updateComponentWatts(selectedObj.id, e.target.value)}
                                    className="w-full mt-2 h-1 bg-gray-200 rounded appearance-none cursor-pointer"
                                />
                            </div>
                        </div>
                    </div>
                )}

                {selectedObj && selectedObj.type === 'wire' && (
                    <div className="absolute top-4 right-4 z-50 bg-white p-3 rounded-xl shadow-xl border border-gray-200 animate-in fade-in zoom-in duration-200" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-3">
                            <span className="text-sm font-bold text-gray-700">เลือกสายไฟแล้ว</span>
                            <button 
                                onClick={deleteSelected}
                                className="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors"
                            >
                                <Trash2 size={14}/> ลบสายไฟ
                            </button>
                        </div>
                    </div>
                )}

                {notification && (
                    <div className={`absolute top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-xl flex items-center gap-3 animate-bounce ${notification.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>
                        {notification.type === 'success' ? <CheckCircle size={24}/> : <AlertTriangle size={24}/>}
                        <span className="font-bold">{notification.message}</span>
                    </div>
                )}

                <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                    {wires.map(w => {
                        const c1 = components.find(c => c.id === w.from);
                        const c2 = components.find(c => c.id === w.to);
                        if(!c1 || !c2) return null;
                        const spec1 = SPECS[c1.type]; const spec2 = SPECS[c2.type];
                        const t1 = spec1.terminals.find(t => t.id === w.fromTerm);
                        const t2 = spec2.terminals.find(t => t.id === w.toTerm);
                        
                        const p1 = { x: c1.x + t1.x, y: c1.y + spec1.height + 5 };
                        const p2 = { x: c2.x + t2.x, y: c2.y + spec2.height + 5 };
                        
                        const path = getWirePath(p1.x, p1.y, p2.x, p2.y, w.customOffset);
                        const defaultMidY = Math.max(p1.y, p2.y) + 40;
                        const midY = w.customOffset ? (defaultMidY + w.customOffset) : defaultMidY;
                        const midX = (p1.x + p2.x) / 2;
                        const isSelected = selectedObj?.type === 'wire' && selectedObj.id === w.id;
                        const wireColor = t1.color === 'red' || t1.color === 'brown' ? '#ef4444' : '#1f2937';

                        return (
                            <g key={w.id} className="pointer-events-auto group" onClick={(e) => handleWireClick(e, w.id)}>
                                <path d={path} stroke="transparent" strokeWidth="20" fill="none" />
                                {isSelected && <path d={path} stroke="#fbbf24" strokeWidth="6" fill="none" strokeLinejoin="miter" className="animate-pulse opacity-70"/>}
                                <path d={path} stroke={wireColor} strokeWidth="2.5" fill="none" strokeLinejoin="round" strokeLinecap="round" className="shadow-sm"/>
                                <circle cx={p1.x} cy={p1.y} r="3" fill={wireColor} />
                                <circle cx={p2.x} cy={p2.y} r="3" fill={wireColor} />
                                <g 
                                    transform={`translate(${midX}, ${midY})`} 
                                    className={`opacity-0 group-hover:opacity-100 cursor-ns-resize transition-opacity ${isSelected ? 'opacity-100' : ''}`}
                                    {...bindStartEvents((e) => { e.stopPropagation(); setDragInfo({ type: 'wireHandle', id: w.id, baseY: defaultMidY }); })}
                                >
                                    <circle r="6" fill="white" stroke="#3b82f6" strokeWidth="2" />
                                    <GripHorizontal size={8} className="text-blue-500 -translate-x-[4px] -translate-y-[4px]" />
                                </g>
                            </g>
                        );
                    })}
                    
                    {tempWire && (
                        <g>
                            <path 
                                d={getWirePath(tempWire.x1, tempWire.y1, tempWire.x2, tempWire.y2)} 
                                stroke="#fbbf24" strokeWidth="2.5" strokeDasharray="4" fill="none" className="animate-pulse"
                            />
                            <circle cx={tempWire.x1} cy={tempWire.y1} r="3" fill="#fbbf24" />
                            <circle cx={tempWire.x2} cy={tempWire.y2} r="3" fill="#fbbf24" />
                        </g>
                    )}
                </svg>

                {components.map(comp => {
                    const spec = SPECS[comp.type];
                    const state = simResults.states[comp.id] || {};
                    const showPower = isRunning && state.physicsPowered;
                    const isSelected = selectedObj?.type === 'comp' && selectedObj.id === comp.id;

                    return (
                        <div key={comp.id} className="absolute group z-10" style={{left: comp.x, top: comp.y}}>
                            <div 
                                {...bindStartEvents((e) => { 
                                    const { x, y } = getLocalPos(e); 
                                    if(e.type === 'mousedown' && e.button !== 0) return;
                                    setDragInfo({ type: 'comp', id: comp.id, offsetX: x - comp.x, offsetY: y - comp.y }); 
                                    handleCompClick(e, comp); 
                                })}
                                className={`relative transition-transform ${isSelected ? 'scale-105 ring-2 ring-yellow-400 rounded-lg' : ''}`}
                            >
                                {isSelected && (
                                    <button onClick={deleteSelected} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1.5 z-50 shadow-md hover:bg-red-600 animate-in zoom-in duration-200">
                                        <Trash2 size={12}/>
                                    </button>
                                )}
                                <svg width={spec.width} height={spec.height + 40} className="overflow-visible drop-shadow-xl">
                                    {comp.type === COMPONENT_TYPES.PANEL && <PVPanelVisual width={spec.width} height={spec.height} sunIntensity={sunIntensity} />}
                                    {comp.type === COMPONENT_TYPES.BATTERY && <BatteryVisual width={spec.width} height={spec.height} soc={batteryState[comp.id]?.soc ?? 50} isCharging={batteryState[comp.id]?.isCharging}/>}
                                    {comp.type === COMPONENT_TYPES.CHARGER && <ChargerVisual width={spec.width} height={spec.height} isCharging={state.isCharging} hasLoad={state.hasLoad}/>}
                                    {comp.type === COMPONENT_TYPES.CAPACITOR && <CapacitorVisual width={spec.width} height={spec.height} />}
                                    {(comp.type === COMPONENT_TYPES.INVERTER || comp.type === COMPONENT_TYPES.BREAKER) && <BoxVisual width={spec.width} height={spec.height} label={comp.label} subLabel={comp.type === 'inverter' ? "220V Out" : ""} isPowered={showPower} error={state.error}/>}
                                    {comp.type === COMPONENT_TYPES.SOCKET && <SocketVisual width={spec.width} height={spec.height} isPowered={showPower} watts={comp.watts || spec.defaultWatts} />}
                                    {comp.type === COMPONENT_TYPES.BULB && <BulbVisual width={spec.width} height={spec.height} isPowered={showPower} watts={comp.watts || spec.defaultWatts} />}
                                    {comp.type === COMPONENT_TYPES.MOTOR && <MotorVisual width={spec.width} height={spec.height} isPowered={showPower} watts={comp.watts || spec.defaultWatts} />}
                                    {comp.type === COMPONENT_TYPES.WIREWAY && <rect x="0" y="0" width={spec.width} height={spec.height} fill="#e5e7eb" stroke="#d1d5db" rx="2" opacity="0.8"/>}

                                    {spec.terminals.map(t => {
                                        // Check if this specific terminal is currently hovered/snapped
                                        const isHovered = hoveredTerm && hoveredTerm.compId === comp.id && hoveredTerm.termId === t.id;
                                        return (
                                            <Terminal key={t.id} x={t.x} y={spec.height + 5} color={t.color} label={t.label} 
                                                isHovered={isHovered}
                                                onInteract={(e) => { 
                                                    setTempWire({ from: comp.id, fromTerm: t.id, x1: comp.x + t.x, y1: comp.y + spec.height + 5, x2: comp.x + t.x, y2: comp.y + spec.height + 5 }); 
                                                }}
                                            />
                                        );
                                    })}
                                </svg>
                            </div>
                        </div>
                    );
                })}

                {activeTool === 'volt' && (
                    <>
                        <VoltmeterDisplay value={getVoltageReading()} />
                        <DraggableProbe type="red" x={probePos.red.x} y={probePos.red.y} onInteract={(e) => { e.stopPropagation(); setDragInfo({ type: 'probe', color: 'red' }); }} />
                        <DraggableProbe type="black" x={probePos.black.x} y={probePos.black.y} onInteract={(e) => { e.stopPropagation(); setDragInfo({ type: 'probe', color: 'black' }); }} />
                        <svg className="absolute inset-0 pointer-events-none z-30">
                            <path d={`M ${window.innerWidth - 100} ${window.innerHeight - 50} C ${window.innerWidth - 100} ${window.innerHeight - 200}, ${probePos.red.x} ${probePos.red.y + 200}, ${probePos.red.x} ${probePos.red.y}`} stroke="#ef4444" strokeWidth="2" fill="none" opacity="0.5"/>
                            <path d={`M ${window.innerWidth - 120} ${window.innerHeight - 50} C ${window.innerWidth - 120} ${window.innerHeight - 200}, ${probePos.black.x} ${probePos.black.y + 200}, ${probePos.black.x} ${probePos.black.y}`} stroke="#1f2937" strokeWidth="2" fill="none" opacity="0.5"/>
                        </svg>
                    </>
                )}

                {activeTool === 'amp' && (
                    <ClampMeterTool 
                        x={clampPos.x} 
                        y={clampPos.y} 
                        value={getCurrentReading()} 
                        isActive={!!clampPos.wireId}
                        onInteract={(e) => { e.stopPropagation(); setDragInfo({ type: 'clamp' }); }} 
                    />
                )}

            </div>
            </div>
        );
        }

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<SolarSimulatorPro />);
    </script>
</body>
</html>
