<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solar Simulator Pro Thai - ระบบจำลองโซล่าเซลล์</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            touch-action: none; 
        }
        .grid-bg {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #2563eb;
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .wire-shadow { filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3)); }
        .animate-spin-fast {
            animation: spin 0.5s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-100 overflow-hidden no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Icon Wrapper Component ---
        const Icon = ({ name, size = 16, className = "", strokeWidth = 2 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                            'stroke-width': strokeWidth
                        },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className, strokeWidth]);
            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        // --- Configuration ---
        const COMPONENT_TYPES = {
            PANEL: 'panel',
            BATTERY: 'battery',
            CHARGER: 'charger',
            INVERTER: 'inverter',
            BREAKER_DC: 'breaker_dc',
            FUSE: 'fuse',
            DC_SURGE: 'dc_surge',
            AC_BREAKER: 'ac_breaker',
            AC_SURGE: 'ac_surge',
            ENERGY_METER: 'energy_meter',
            AC_SOURCE: 'ac_source', 
            GROUND_BAR: 'ground_bar', 
            SOCKET: 'socket',
            BULB: 'bulb',
            MOTOR: 'motor'
        };

        const SPECS = {
            [COMPONENT_TYPES.PANEL]: { label: 'แผงโซล่าเซลล์', icon: 'sun', width: 120, height: 160, terminals: [{id: 'pos', x: 40, color: 'red'}, {id: 'neg', x: 80, color: 'black'}], editable: 'efficiency', unit: '%' },
            [COMPONENT_TYPES.BATTERY]: { label: 'แบตเตอรี่ 12V', icon: 'battery', width: 110, height: 130, terminals: [{id: 'pos', x: 30, color: 'red'}, {id: 'neg', x: 80, color: 'black'}], editable: 'capacity', unit: 'Ah' },
            [COMPONENT_TYPES.CHARGER]: { label: 'โซล่าร์ชาร์จเจอร์', icon: 'battery-charging', width: 180, height: 120, terminals: [{id: 'pv_pos', label: 'PV+', x: 25, color: 'red'}, {id: 'pv_neg', label: 'PV-', x: 50, color: 'black'}, {id: 'bat_pos', label: 'BAT+', x: 90, color: 'red'}, {id: 'bat_neg', label: 'BAT-', x: 115, color: 'black'}, {id: 'load_pos', label: 'LOAD+', x: 145, color: 'red'}, {id: 'load_neg', label: 'LOAD-', x: 170, color: 'black'}] },
            [COMPONENT_TYPES.FUSE]: { label: 'DC Fuse', icon: 'shield-check', width: 80, height: 60, terminals: [{id: 'in', label: 'เข้า', x: 20, color: 'black'}, {id: 'out', label: 'ออก', x: 60, color: 'black'}] },
            [COMPONENT_TYPES.BREAKER_DC]: { label: 'DC Breaker', icon: 'power', width: 120, height: 100, terminals: [{id: 'in_1', label: 'เข้า', x: 30, color: 'black'}, {id: 'in_2', label: 'เข้า', x: 50, color: 'black'}, {id: 'out_1', label: 'ออก', x: 70, color: 'black'}, {id: 'out_2', label: 'ออก', x: 90, color: 'black'}] },
            [COMPONENT_TYPES.DC_SURGE]: { label: 'DC Surge (SPD)', icon: 'shield-alert', width: 90, height: 90, terminals: [{id: 'pos', label: '+', x: 25, color: 'red'}, {id: 'neg', label: '-', x: 45, color: 'black'}, {id: 'g', label: 'G', x: 65, color: 'green'}] },
            [COMPONENT_TYPES.AC_SURGE]: { label: 'AC Surge (SPD)', icon: 'shield-check', width: 90, height: 90, terminals: [{id: 'l', label: 'L', x: 25, color: 'brown'}, {id: 'n', label: 'N', x: 45, color: 'blue'}, {id: 'g', label: 'G', x: 65, color: 'green'}] },
            [COMPONENT_TYPES.AC_BREAKER]: { label: 'AC Breaker', icon: 'power', width: 120, height: 100, terminals: [{id: 'in_l', label: 'L-เข้า', x: 30, color: 'brown'}, {id: 'in_n', label: 'N-เข้า', x: 50, color: 'blue'}, {id: 'out_l', label: 'L-ออก', x: 70, color: 'brown'}, {id: 'out_n', label: 'N-ออก', x: 90, color: 'blue'}] },
            [COMPONENT_TYPES.INVERTER]: { label: 'อินเวอร์เตอร์', icon: 'activity', width: 150, height: 110, terminals: [{id: 'dc_pos', label: 'DC+', x: 30, color: 'red'}, {id: 'dc_neg', label: 'DC-', x: 55, color: 'black'}, {id: 'ac_l', label: 'L', x: 105, color: 'brown'}, {id: 'ac_n', label: 'N', x: 130, color: 'blue'}] },
            [COMPONENT_TYPES.AC_SOURCE]: { label: 'AC 220V Grid', icon: 'zap', width: 110, height: 110, terminals: [{id: 'l', label: 'L', x: 30, color: 'brown'}, {id: 'n', label: 'N', x: 55, color: 'blue'}, {id: 'g', label: 'G', x: 80, color: 'green'}] },
            [COMPONENT_TYPES.GROUND_BAR]: { label: 'Ground Bar', icon: 'database', width: 160, height: 45, terminals: [{id: 'g1', x: 25, color: 'green'}, {id: 'g2', x: 55, color: 'green'}, {id: 'g3', x: 85, color: 'green'}, {id: 'g4', x: 115, color: 'green'}, {id: 'g5', x: 145, color: 'green'}] },
            [COMPONENT_TYPES.ENERGY_METER]: { label: 'Energy Meter', icon: 'gauge', width: 140, height: 100, terminals: [{id: 'in_l', label: 'L-เข้า', x: 25, color: 'brown'}, {id: 'in_n', label: 'N-เข้า', x: 50, color: 'blue'}, {id: 'out_l', label: 'L-ออก', x: 90, color: 'brown'}, {id: 'out_n', label: 'N-ออก', x: 115, color: 'blue'}] },
            [COMPONENT_TYPES.SOCKET]: { label: 'เต้ารับ (Socket)', icon: 'power', width: 80, height: 80, terminals: [{id: 'l', label: 'L', x: 25, color: 'brown'}, {id: 'n', label: 'N', x: 55, color: 'blue'}], editable: 'watts', unit: 'W' },
            [COMPONENT_TYPES.BULB]: { label: 'หลอดไฟ (Bulb)', icon: 'lightbulb', width: 90, height: 110, terminals: [{id: 'l', label: 'L', x: 30, color: 'brown'}, {id: 'n', label: 'N', x: 60, color: 'blue'}], editable: 'watts', unit: 'W' },
            [COMPONENT_TYPES.MOTOR]: { label: 'มอเตอร์ (Motor)', icon: 'fan', width: 110, height: 110, terminals: [{id: 'l', label: '+', x: 35, color: 'red'}, {id: 'n', label: '-', x: 75, color: 'black'}], editable: 'watts', unit: 'W' },
        };

        // --- Utils ---
        const getWirePath = (x1, y1, x2, y2, offX = 0, offY = 40) => {
            const midY = Math.max(y1, y2) + offY;
            const midX = (x1 + x2) / 2 + offX;
            return `M ${x1} ${y1} L ${x1} ${midY} L ${midX} ${midY} L ${x2} ${midY} L ${x2} ${y2}`;
        };

        // --- Visual Components ---
        const Terminal = ({ x, y, color, label, onPointerDown, isHovered }) => (
            <g transform={`translate(${x}, ${y})`} onPointerDown={(e) => { e.stopPropagation(); onPointerDown(e); }} className="cursor-crosshair">
                <circle r="25" fill="transparent" /> 
                <g className={`transition-all duration-200 origin-center ${isHovered ? 'scale-150' : ''}`}>
                    <rect x="-7" y="-7" width="14" height="14" fill="#374151" rx="2" stroke={isHovered ? "#fbbf24" : "none"} strokeWidth={2} />
                    <circle r="5" fill={color} stroke="white" strokeWidth="1.5" />
                </g>
                {label && <text x="0" y={isHovered ? 28 : 22} textAnchor="middle" fill={isHovered ? "#000" : "#4b5563"} fontSize="8" fontWeight="bold" className="pointer-events-none uppercase">{label}</text>}
            </g>
        );

        const PVPanelVisual = ({ width, height, sunIntensity, efficiency }) => (
            <g>
                <rect x="0" y="0" width={width} height={height} fill={`rgb(30, 58, ${180 + (sunIntensity/2)})`} stroke="#cbd5e1" strokeWidth="2" />
                <g stroke="rgba(255,255,255,0.4)" strokeWidth="1">
                    <line x1="0" y1={height/4} x2={width} y2={height/4} /><line x1="0" y1={height/2} x2={width} y2={height/2} />
                    <line x1="0" y1={height*0.75} x2={width} y2={height*0.75} /><line x1={width/2} y1="0" x2={width/2} y2={height} />
                </g>
                <text x={width/2} y={height/2} textAnchor="middle" fill="white" opacity="0.8" fontSize="12" fontWeight="bold">PV {efficiency}%</text>
            </g>
        );

        const BatteryVisual = ({ width, height, soc = 75 }) => (
            <g>
                <rect x="5" y="10" width={width-10} height={height-10} rx="6" fill="#1f2937" stroke="#374151" strokeWidth="2" />
                <rect x="20" y="0" width="20" height="12" fill="#dc2626" rx="2" />
                <rect x={width-40} y="0" width="20" height="12" fill="#111827" rx="2" />
                <rect x="15" y="45" width={width-30} height={55} rx="3" fill="#374151" stroke="#4b5563" />
                <rect x="18" y="48" width={(width-36)*(soc/100)} height={49} rx="2" fill="#22c55e" opacity="0.9" />
                <text x={width/2} y="78" textAnchor="middle" fill="white" fontSize="16" fontWeight="bold">{Math.round(soc)}%</text>
            </g>
        );

        const App = () => {
            const [components, setComponents] = useState([]);
            const [wires, setWires] = useState([]); 
            const [sunIntensity, setSunIntensity] = useState(80);
            const [dragInfo, setDragInfo] = useState(null); 
            const [tempWire, setTempWire] = useState(null);
            const [hoveredTerm, setHoveredTerm] = useState(null);
            const [selectedObj, setSelectedObj] = useState(null); 
            const [isRunning, setIsRunning] = useState(false);
            const [simResults, setSimResults] = useState({ voltages: new Map(), states: {} });

            const canvasRef = useRef(null);

            const getLocalPos = (e) => {
                if (!canvasRef.current) return { x: 0, y: 0 };
                const rect = canvasRef.current.getBoundingClientRect();
                return { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };

            // --- Simulation Logic ---
            useEffect(() => {
                const nets = [];
                const getNet = (id) => nets.find(s => s.has(id));
                components.forEach(c => {
                    const spec = SPECS[c.type];
                    if(spec?.terminals) spec.terminals.forEach(t => {
                        const s = new Set();
                        s.add(`${c.id}_${t.id}`);
                        nets.push(s);
                    });
                });
                wires.forEach(w => {
                    const n1 = getNet(`${w.from}_${w.fromTerm}`);
                    const n2 = getNet(`${w.to}_${w.toTerm}`);
                    if(n1 && n2 && n1 !== n2) {
                        n2.forEach(i => n1.add(i));
                        nets.splice(nets.indexOf(n2), 1);
                    }
                });

                const netVoltages = new Map();
                const compStates = {};

                components.filter(c => c.type === COMPONENT_TYPES.PANEL).forEach(pv => {
                    const v = 25 * (sunIntensity/100) * ((pv.efficiency || 100) / 100);
                    const pos = getNet(`${pv.id}_pos`); const neg = getNet(`${pv.id}_neg`);
                    if(!netVoltages.has(neg)) netVoltages.set(neg, 0);
                    netVoltages.set(pos, Math.max(netVoltages.get(pos)||0, (netVoltages.get(neg)||0) + v));
                    compStates[pv.id] = { isPowered: v > 5 };
                });

                components.filter(c => c.type === COMPONENT_TYPES.AC_SOURCE).forEach(src => {
                    const l = getNet(`${src.id}_l`); const n = getNet(`${src.id}_n`);
                    if(!netVoltages.has(n)) netVoltages.set(n, 0);
                    netVoltages.set(l, 220);
                    compStates[src.id] = { isPowered: true };
                });

                for(let i=0; i<8; i++) {
                    components.forEach(c => {
                        if([COMPONENT_TYPES.AC_BREAKER, COMPONENT_TYPES.BREAKER_DC, COMPONENT_TYPES.FUSE].includes(c.type)) {
                            const pairs = c.type === COMPONENT_TYPES.AC_BREAKER ? [['in_l', 'out_l'], ['in_n', 'out_n']] : (c.type === COMPONENT_TYPES.FUSE ? [['in', 'out']] : [['in_1', 'out_1'], ['in_2', 'out_2']]);
                            pairs.forEach(([iId, oId]) => {
                                const nI = getNet(`${c.id}_${iId}`); const nO = getNet(`${c.id}_${oId}`);
                                if(netVoltages.has(nI)) netVoltages.set(nO, netVoltages.get(nI));
                                else if(netVoltages.has(nO)) netVoltages.set(nI, netVoltages.get(nO));
                            });
                            compStates[c.id] = { isPowered: true };
                        }
                        if(c.type === COMPONENT_TYPES.CHARGER) {
                            const pvp = getNet(`${c.id}_pv_pos`); const batp = getNet(`${c.id}_bat_pos`);
                            const vpv = netVoltages.get(pvp) || 0;
                            if(vpv > 13) netVoltages.set(batp, 14.4);
                            compStates[c.id] = { isCharging: vpv > 13, hasLoad: false };
                        }
                        if(c.type === COMPONENT_TYPES.INVERTER) {
                            const acl = getNet(`${c.id}_ac_l`); const dcp = getNet(`${c.id}_dc_pos`);
                            if((netVoltages.get(dcp)||0) > 11) { netVoltages.set(acl, 220); compStates[c.id] = { isPowered: true }; }
                        }
                        if(c.type === COMPONENT_TYPES.ENERGY_METER) {
                            const l = getNet(`${c.id}_in_l`); const n = getNet(`${c.id}_in_n`);
                            const v = Math.abs((netVoltages.get(l)||0) - (netVoltages.get(n)||0));
                            compStates[c.id] = { isPowered: v > 20, volts: v };
                        }
                        if(['bulb','socket','motor'].includes(c.type)) {
                            const l = getNet(`${c.id}_l`); const n = getNet(`${c.id}_n`);
                            const v = Math.abs((netVoltages.get(l)||0) - (netVoltages.get(n)||0));
                            compStates[c.id] = { isPowered: v > 20 };
                        }
                    });
                }
                setSimResults({ voltages: netVoltages, states: compStates });
            }, [components, wires, sunIntensity]);

            const handlePointerMove = (e) => {
                const pos = getLocalPos(e);
                if(dragInfo?.type === 'comp') {
                    setComponents(prev => prev.map(c => c.id === dragInfo.id ? {...c, x: pos.x - dragInfo.offsetX, y: pos.y - dragInfo.offsetY} : c));
                }
                if(dragInfo?.type === 'wireHandle') {
                    setWires(prev => prev.map(w => w.id === dragInfo.id ? { ...w, offsetX: pos.x - dragInfo.baseX, offsetY: pos.y - dragInfo.baseY } : w));
                }
                if(tempWire) {
                    setTempWire(prev => ({...prev, x2: pos.x, y2: pos.y}));
                }
                let hit = null;
                components.forEach(c => {
                    const spec = SPECS[c.type];
                    spec.terminals?.forEach(t => {
                        const d = Math.hypot(pos.x - (c.x + t.x), pos.y - (c.y + spec.height + 5));
                        if(d < 25) hit = { compId: c.id, termId: t.id };
                    });
                });
                setHoveredTerm(hit);
            };

            const handlePointerUp = () => {
                if(tempWire && hoveredTerm) {
                    if(hoveredTerm.compId !== tempWire.from || hoveredTerm.termId !== tempWire.fromTerm) {
                        setWires(prev => [...prev, { id: Date.now(), from: tempWire.from, fromTerm: tempWire.fromTerm, to: hoveredTerm.compId, toTerm: hoveredTerm.termId, offsetX: 0, offsetY: 40 }]);
                    }
                }
                setTempWire(null); setDragInfo(null);
            };

            const addComponent = (type) => {
                const spec = SPECS[type];
                if(!spec) return;
                setComponents(prev => [...prev, { id: Date.now().toString(), type, x: 100, y: 100, watts: 100, efficiency: 100, capacity: 100 }]);
                setSelectedObj(null);
            };

            const deleteObj = (obj) => {
                if(!obj) return;
                if(obj.type === 'comp') {
                    setComponents(prev => prev.filter(c => c.id !== obj.id));
                    setWires(prev => prev.filter(w => w.from !== obj.id && w.to !== obj.id));
                } else setWires(prev => prev.filter(w => w.id !== obj.id));
                setSelectedObj(null);
            };

            const selectedCompData = useMemo(() => {
                if(selectedObj?.type === 'comp') return components.find(c => c.id === selectedObj.id);
                return null;
            }, [selectedObj, components]);

            return (
                <div className="flex flex-col md:flex-row h-screen" onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onClick={() => setSelectedObj(null)}>
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-white border-b md:border-r shadow-xl flex flex-col z-40 overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-4 bg-slate-900 text-white font-bold flex gap-2 items-center">
                            <Icon name="zap" size={18} className="text-yellow-400 fill-current" /> Solar Sim Pro Thai
                        </div>
                        <div className="p-4 flex-1 overflow-y-auto space-y-4 flex flex-row md:flex-col gap-2 md:gap-4 flex-wrap">
                            <button onClick={() => setIsRunning(!isRunning)} className={`w-full p-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${isRunning ? 'bg-red-500 text-white' : 'bg-green-600 text-white'}`}>
                                <Icon name={isRunning ? 'rotate-ccw' : 'play'} /> <span className="hidden md:inline">{isRunning ? 'หยุดจำลอง' : 'เริ่มจำลอง'}</span>
                            </button>
                            <div className="p-3 bg-blue-50 rounded-xl text-xs font-bold text-blue-800 uppercase flex-1 min-w-[150px]">
                                ความเข้มแสง: {sunIntensity}%
                                <input type="range" min="0" max="100" value={sunIntensity} onChange={(e) => setSunIntensity(parseInt(e.target.value))} className="w-full mt-2 cursor-pointer accent-blue-600 h-6"/>
                            </div>
                            
                            <div className="space-y-1 w-full border-t md:border-0 pt-2 md:pt-0">
                                <label className="hidden md:block text-[10px] font-bold text-gray-400 uppercase">แหล่งจ่าย/อุปกรณ์/โหลด</label>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-1 gap-1">
                                    {Object.keys(SPECS).map(key => (
                                        <button key={key} onClick={() => addComponent(key)} className="text-left p-2 hover:bg-slate-100 rounded-lg text-xs flex items-center gap-2 font-medium bg-slate-50 border whitespace-nowrap overflow-hidden text-ellipsis">
                                            <Icon name={SPECS[key].icon} size={14}/> {SPECS[key].label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Canvas Area */}
                    <div ref={canvasRef} className="flex-1 relative grid-bg overflow-hidden touch-none h-full">
                        {selectedObj && selectedObj.type === 'comp' && (
                            <div className="absolute top-4 right-4 z-50 bg-white p-5 rounded-2xl shadow-2xl border-2 border-blue-100 w-72" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="settings" size={18}/> {SPECS[selectedCompData?.type]?.label}</h3>
                                    <button onClick={() => deleteObj(selectedObj)} className="bg-red-50 text-red-500 p-3 rounded-full hover:bg-red-500 hover:text-white transition-colors"><Icon name="trash-2" /></button>
                                </div>
                                {selectedCompData && SPECS[selectedCompData.type]?.editable && (
                                    <div className="space-y-4">
                                        <label className="text-xs font-bold text-slate-400 uppercase">ปรับค่า ({SPECS[selectedCompData.type].unit})</label>
                                        <input 
                                            type="range" min="10" max="2000" step="5" 
                                            value={selectedCompData[SPECS[selectedCompData.type].editable]} 
                                            onChange={(e) => setComponents(prev => prev.map(c => c.id === selectedObj.id ? { ...c, [SPECS[c.type].editable]: parseInt(e.target.value) } : c))}
                                            className="w-full h-8 cursor-pointer accent-blue-600"
                                        />
                                        <div className="text-center font-bold text-blue-600 text-3xl">{selectedCompData[SPECS[selectedCompData.type].editable]} {SPECS[selectedCompData.type].unit}</div>
                                    </div>
                                )}
                            </div>
                        )}

                        <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible">
                            {wires.map(w => {
                                const c1 = components.find(c => c.id === w.from); const c2 = components.find(c => c.id === w.to);
                                if(!c1 || !c2) return null;
                                const t1 = SPECS[c1.type].terminals.find(t => t.id === w.fromTerm);
                                const t2 = SPECS[c2.type].terminals.find(t => t.id === w.toTerm);
                                const p1 = { x: c1.x + t1.x, y: c1.y + SPECS[c1.type].height + 5 };
                                const p2 = { x: c2.x + t2.x, y: c2.y + SPECS[c2.type].height + 5 };
                                const offX = w.offsetX || 0; const offY = w.offsetY || 40;
                                const path = getWirePath(p1.x, p1.y, p2.x, p2.y, offX, offY);
                                const isSel = selectedObj?.type === 'wire' && selectedObj.id === w.id;
                                const wireColor = ['red','brown'].includes(t1.color) ? '#ef4444' : (t1.color === 'blue' ? '#2563eb' : (t1.color === 'green' ? '#22c55e' : '#1e293b'));
                                return (
                                    <g key={w.id} className="pointer-events-auto cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedObj({ type: 'wire', id: w.id }); }}>
                                        <path d={path} stroke="transparent" strokeWidth="30" fill="none" />
                                        <path d={path} stroke={isSel ? "#fbbf24" : wireColor} strokeWidth={isSel ? 6 : 3} fill="none" strokeLinecap="round" className="wire-shadow" />
                                        <g transform={`translate(${(p1.x+p2.x)/2 + offX}, ${Math.max(p1.y, p2.y) + offY})`}>
                                            <circle r="15" fill="white" stroke="#3b82f6" strokeWidth="2" className="shadow-lg" />
                                            <Icon name="move" size={16} className="text-blue-500 absolute" style={{left: -8, top: -8}} onPointerDown={(e) => { e.stopPropagation(); setDragInfo({ type: 'wireHandle', id: w.id, baseX: (p1.x + p2.x) / 2, baseY: Math.max(p1.y, p2.y) }); }} />
                                        </g>
                                    </g>
                                );
                            })}
                            {tempWire && <path d={getWirePath(tempWire.x1, tempWire.y1, tempWire.x2, tempWire.y2)} stroke="#fbbf24" strokeWidth="4" strokeDasharray="5 5" fill="none" />}
                        </svg>

                        {components.map(comp => {
                            const spec = SPECS[comp.type];
                            const state = simResults.states[comp.id] || {};
                            const isSel = selectedObj?.type === 'comp' && selectedObj.id === comp.id;
                            return (
                                <div key={comp.id} className="absolute z-10" style={{left: comp.x, top: comp.y}}>
                                    <div 
                                        onPointerDown={(e) => { e.stopPropagation(); const pos = getLocalPos(e); setDragInfo({ type: 'comp', id: comp.id, offsetX: pos.x-comp.x, offsetY: pos.y-comp.y }); setSelectedObj({ type: 'comp', id: comp.id }); }}
                                        className={`relative cursor-move transition-all ${isSel ? 'ring-4 ring-blue-500 ring-offset-4 rounded-xl shadow-2xl scale-105' : ''}`}
                                    >
                                        {isSel && <button onClick={(e) => { e.stopPropagation(); deleteObj({type:'comp', id: comp.id}); }} className="absolute -top-8 -right-8 bg-red-500 text-white rounded-full p-3 shadow-xl hover:bg-red-600 z-50 transition-transform hover:scale-110"><Icon name="x" size={20} strokeWidth={3}/></button>}
                                        <svg width={spec.width} height={spec.height + 40} className="overflow-visible drop-shadow-md">
                                            {comp.type === COMPONENT_TYPES.PANEL && <PVPanelVisual width={spec.width} height={spec.height} sunIntensity={sunIntensity} efficiency={comp.efficiency} />}
                                            {comp.type === COMPONENT_TYPES.BATTERY && <BatteryVisual width={spec.width} height={spec.height} soc={comp.soc || 75} />}
                                            {comp.type === COMPONENT_TYPES.CHARGER && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="12" fill="#0ea5e9" stroke="#0369a1" strokeWidth="2" />
                                                    <rect x="25" y="20" width={spec.width-50} height="40" rx="4" fill="#ecfccb" stroke="#84cc16" strokeWidth="1.5" />
                                                    <text x={spec.width/2} y="47" textAnchor="middle" fill="#365314" fontSize="14" fontWeight="bold" fontFamily="monospace">{state.isCharging ? "CHARGING" : "STANDBY"}</text>
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.MOTOR && (
                                                <g>
                                                    <rect x="10" y="20" width={spec.width-20} height={spec.height-40} rx="8" fill="#4b5563" stroke="#374151" strokeWidth="2" />
                                                    <circle cx={spec.width/2} cy={spec.height/2} r="30" fill="#374151" stroke="#94a3b8" strokeWidth="2" />
                                                    <g transform={`translate(${spec.width/2}, ${spec.height/2})`} className={state.isPowered ? "animate-spin-fast origin-center" : ""}>
                                                        <path d="M-15 0 L15 0 M0 -15 L0 15" stroke="white" strokeWidth="3" />
                                                    </g>
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.BULB && (
                                                <g>
                                                    <circle cx={spec.width/2} cy={spec.height/2-5} r="25" fill={state.isPowered ? "#fef08a" : "#f1f5f9"} stroke={state.isPowered ? "#facc15" : "#cbd5e1"} strokeWidth={2} />
                                                    {state.isPowered && <circle cx={spec.width/2} cy={spec.height/2-5} r="32" fill="none" stroke="#fef08a" strokeWidth="2" opacity="0.5" className="animate-pulse" />}
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.ENERGY_METER && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="4" fill="#1e293b" stroke="#0f172a" strokeWidth="2" />
                                                    <rect x="10" y="10" width={spec.width-20} height={50} rx="2" fill="#064e3b" />
                                                    <text x={spec.width/2} y={45} textAnchor="middle" fill={state.isPowered ? "#4ade80" : "#065f46"} fontSize="24" fontFamily="monospace" fontWeight="bold">{state.isPowered ? state.volts.toFixed(1) : "00.0"}</text>
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.GROUND_BAR && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="4" fill="#94a3b8" stroke="#475569" strokeWidth="2" />
                                                    {[25, 55, 85, 115, 145].map(cx => ( <circle key={cx} cx={cx} cy={spec.height/2} r="5" fill="#475569" stroke="#1e293b" strokeWidth="1" /> ))}
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.DC_SURGE && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="4" fill="#991b1b" stroke="#450a0a" strokeWidth="2" />
                                                    <rect x="10" y="10" width={spec.width - 20} height={spec.height / 2} rx="2" fill="white" opacity="0.2" />
                                                    <text x={spec.width/2} y={spec.height - 15} textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">DC SPD</text>
                                                </g>
                                            )}
                                            {comp.type === COMPONENT_TYPES.AC_SURGE && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="4" fill="#166534" stroke="#052e16" strokeWidth="2" />
                                                    <rect x="10" y="10" width={spec.width - 20} height={spec.height / 2} rx="2" fill="white" opacity="0.2" />
                                                    <text x={spec.width/2} y={spec.height - 15} textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">AC SPD</text>
                                                </g>
                                            )}
                                            {['inverter','breaker_dc','ac_breaker','socket','ac_source','fuse'].includes(comp.type) && (
                                                <g>
                                                    <rect x="0" y="0" width={spec.width} height={spec.height} rx="6" fill={comp.type === 'fuse' ? '#f1f5f9' : 'white'} stroke="#374151" strokeWidth="2" />
                                                    <text x={spec.width/2} y={spec.height/2} textAnchor="middle" fill="#0f172a" fontSize="10" fontWeight="bold" className="uppercase">{spec.label.split(' (')[0]}</text>
                                                    {state.isPowered && <circle cx={spec.width-12} cy="12" r="4" fill="#22c55e" />}
                                                </g>
                                            )}
                                            
                                            {spec.terminals?.map(t => (
                                                <Terminal key={t.id} x={t.x} y={spec.height + 5} color={t.color} label={t.label} isHovered={hoveredTerm?.compId === comp.id && hoveredTerm?.termId === t.id} onPointerDown={(e) => { const pos = getLocalPos(e); setTempWire({ from: comp.id, fromTerm: t.id, x1: comp.x+t.x, y1: comp.y+spec.height+5, x2: pos.x, y2: pos.y }); }} />
                                            ))}
                                        </svg>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
